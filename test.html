<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoopify - Premium Ice Cream</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
            Scoopify Design Tokens (High Contrast Text)
            ========================================= */

        :root {
            --primary: #B04358;
            --primary-hover: #9A384C;
            --accent-pink: #FFD1DC; 
            --pastel-pink: #F4C9D3;
            
            --bg-deep: #5C2430; 
            --bg-gradient: radial-gradient(circle at 50% -20%, #8B3648 0%, var(--bg-deep) 100%);
            
            --text-white: #FFFFFF;
            --text-high-contrast: #3A121A; 
            --text-sub-dark: #4A1E26;     
            
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg-deep);
            font-family: 'Poppins', sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* =========================================
            Typography (Optimized for Visibility)
            ========================================= */

        h1, .h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
            color: var(--text-high-contrast); 
        }

        p, .body-text {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 400;
            color: var(--text-sub-dark); 
        }

        .btn-text {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 500;
        }

        .caption {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-sub-dark); 
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding-left: 20px;
            padding-right: 20px;
        }

        /* States */
        .interactive {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .interactive:active {
            transform: scale(0.98);
        }

        /* =========================================
            Hero Section
            ========================================= */

        .hero-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: 
                radial-gradient(circle at 85% 20%, rgba(238, 171, 192, 0.45) 0%, transparent 45%),
                radial-gradient(circle at 10% 90%, rgba(244, 201, 211, 0.35) 0%, transparent 40%),
                linear-gradient(135deg, #FAF8F8 0%, #FFF2F4 100%);
            padding: 100px 0;
            overflow: hidden;
        }

        .hero-grid {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        /* Left Content */
        .hero-content {
            max-width: 550px;
        }

        .hero-title {
            margin-bottom: 20px;
        }

        .hero-title .highlight {
            color: var(--primary); 
        }

        .hero-title .heart-icon {
            color: var(--primary);
            vertical-align: middle;
            font-size: 0.9em;
        }

        .hero-description {
            margin-bottom: 40px;
            font-size: 18px;
            font-weight: 400;
        }

        /* Buttons */
        .hero-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #FFFFFF;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(176, 67, 88, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: rgba(92, 36, 48, 0.06);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }

        .btn-secondary:hover {
            background-color: rgba(176, 67, 88, 0.1);
        }

        /* =========================================
            Continuous Marquee with 4s Pause Steps
            ========================================= */
        
        .hero-image-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 600px; 
            width: 100%;
            /* Soft fade mask on the left and right margins so photos blend out smoothly */
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            overflow: hidden; 
        }

        /* Decorative glow behind photos */
        .hero-image-wrapper::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(176, 67, 88, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }

        /* The moving track holding the looped photos continuously */
        .hero-track {
            display: flex;
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            /* Smooth cubic-bezier transition handles the sliding steps cleanly */
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
            z-index: 2;
        }

        .hero-slide {
            flex-shrink: 0;
            width: 450px;
            height: 500px;
            object-fit: contain;
            margin-right: 80px; 
            filter: drop-shadow(0 20px 30px rgba(92, 36, 48, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* =========================================
            Responsive Adaptation
            ========================================= */

        @media (max-width: 992px) {
            h1, .h1 { font-size: 40px; }
            .hero-grid {
                grid-template-columns: 1fr;
                gap: 40px;
                text-align: center;
                justify-items: center;
            }
            .hero-content { max-width: 700px; }
            .hero-buttons { justify-content: center; }
            .hero-section { padding: 80px 0; }
            .hero-image-wrapper { height: 450px; }
            .hero-slide { width: 320px; height: 380px; margin-right: 50px; }
        }

        @media (max-width: 576px) {
            h1, .h1 { font-size: 32px; }
            .hero-description { font-size: 16px; }
            .btn { padding: 12px 24px; width: 100%; }
            .hero-buttons { flex-direction: column; width: 100%; gap: 12px; }
            .hero-image-wrapper { height: 300px; }
            .hero-slide { width: 240px; height: 260px; margin-right: 30px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="container">
            <div class="hero-grid">
                <!-- Left Content -->
                <div class="hero-content">
                    <h1 class="hero-title">
                        Scoop Happiness<br>
                        in <span class="highlight">Every Bite</span> 
                        <span class="heart-icon">♥</span>
                    </h1>
                    <p class="hero-description">
                        Crafted with the finest real ingredients. Indulge in premium flavors designed to make your moments sweeter.
                    </p>
                    
                    <div class="hero-buttons">
                        <a href="menu.html" class="btn btn-primary interactive btn-text">
                            Order Now
                        </a>
                        <a href="flavors.html" class="btn btn-secondary interactive btn-text">
                            Explore Flavors
                        </a>
                    </div>
                </div>

                <!-- Right Column: Marquee with Stop-and-Go Interval -->
                <div class="hero-image-wrapper" id="heroSlideshow">
                    <div class="hero-track" id="heroTrack">
                        <!-- Original Set (1, 2, 3) -->
                        <img src="https://i.ibb.co/3Y8V9P5/premium-ice-cream-png.png" alt="Premium Ice Cream 1" class="hero-slide">
                        <img src="https://i.ibb.co/3Y8V9P5/premium-ice-cream-png.png" alt="Premium Ice Cream 2" class="hero-slide">
                        <img src="https://i.ibb.co/3Y8V9P5/premium-ice-cream-png.png" alt="Premium Ice Cream 3" class="hero-slide">
                        
                        <!-- Exact Duplicate Set for Seamless Infinite Loop (1, 2, 3) -->
                        <img src="https://i.ibb.co/3Y8V9P5/premium-ice-cream-png.png" alt="Premium Ice Cream 1 Duplicate" class="hero-slide">
                        <img src="https://i.ibb.co/3Y8V9P5/premium-ice-cream-png.png" alt="Premium Ice Cream 2 Duplicate" class="hero-slide">
                        <img src="https://i.ibb.co/3Y8V9P5/premium-ice-cream-png.png" alt="Premium Ice Cream 3 Duplicate" class="hero-slide">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- JavaScript to pause for 4s, step to the next photo, and repeat seamlessly -->
    <script>
        const track = document.getElementById('heroTrack');
        const slides = track.querySelectorAll('.hero-slide');
        let currentIndex = 0;
        const totalItems = 3; // Number of unique slides before duplication

        function getSlideStep() {
            const slideWidth = slides[0].getBoundingClientRect().width;
            const computedStyle = window.getComputedStyle(slides[0]);
            const marginRight = parseFloat(computedStyle.marginRight);
            return slideWidth + marginRight;
        }

        function moveToNextSlide() {
            currentIndex++;
            const step = getSlideStep();
            track.style.transform = `translateY(-50%) translateX(-${currentIndex * step}px)`;

            // When it reaches the duplicate set, instantly reset back to the start without animation
            if (currentIndex === totalItems) {
                setTimeout(() => {
                    track.style.transition = 'none';
                    currentIndex = 0;
                    track.style.transform = `translateY(-50%) translateX(0px)`;
                    
                    // Re-enable smooth transition after reset frame
                    setTimeout(() => {
                        track.style.transition = 'transform 1.2s cubic-bezier(0.25, 1, 0.5, 1)';
                    }, 50);
                }, 1200); // Matches the 1.2s transition time
            }
        }

        // Sets the interval to run every 4 seconds of pause time plus transition time
        setInterval(moveToNextSlide, 5200);
    </script>

</body>
</html>
