<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GELATO - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        /* =========================================
           Design Tokens & Base Styles
           ========================================= */
        :root {
            --primary: #B04358;
            --primary-hover: #963548;
            --text-high-contrast: #2D2325;
            --text-sub-dark: #665558;
            --text-white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FAF8F8;
            color: var(--text-high-contrast);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* =========================================
           Navbar & Side Panel Styles
           ========================================= */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(250, 248, 248, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(176, 67, 88, 0.1);
        }

        .navbar-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
        }

        .navbar-links {
            display: flex;
            gap: 30px;
            list-style: none;
            align-items: center;
        }

        .navbar-links a {
            text-decoration: none;
            color: var(--text-high-contrast);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .navbar-links a:hover,
        .navbar-links a.active {
            color: var(--primary);
        }

        .navbar-icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar-search {
            display: flex;
            align-items: center;
            background: #FFF;
            border: 1px solid rgba(176, 67, 88, 0.2);
            border-radius: 50px;
            padding: 5px 15px;
            gap: 8px;
        }

        .navbar-search input {
            border: none;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            background: transparent;
            width: 120px;
        }

        .navbar-icons a {
            color: var(--text-high-contrast);
            font-size: 20px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .navbar-icons a:hover {
            color: var(--primary) !important;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -10px;
            background-color: var(--primary);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50px;
            font-weight: 600;
        }

        /* Hamburger Toggle Button */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background-color: var(--text-high-contrast);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* =========================================
           Hero Section Styles
           ========================================= */
        .hero-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: 
                radial-gradient(circle at 85% 20%, rgba(238, 171, 192, 0.45) 0%, transparent 45%),
                radial-gradient(circle at 10% 90%, rgba(244, 201, 211, 0.35) 0%, transparent 40%),
                linear-gradient(135deg, #FAF8F8 0%, #FFF2F4 100%);
            padding: 140px 0 100px 0;
            overflow: hidden;
        }

        .hero-grid {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .hero-content {
            max-width: 600px;
        }

        .hero-subtitle-top {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 700;
            line-height: 1.15;
            color: var(--text-high-contrast);
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .hero-title .line-1 {
            display: flex;
            align-items: center;
            gap: 12px;
            transform: rotate(-2deg);
            transform-origin: left center;
        }

        .hero-title .line-2 {
            display: flex;
            align-items: center;
            gap: 12px;
            transform: rotate(2deg);
            transform-origin: left center;
            margin-left: 15px;
        }

        .hero-title .dark-word {
            color: var(--text-high-contrast);
            text-shadow: 3px 3px 0px #FFFFFF, 6px 6px 0px rgba(176, 67, 88, 0.15);
        }

        .hero-title .highlight-3d {
            color: var(--primary);
            text-shadow: 3px 3px 0px #FFFFFF, 6px 6px 0px rgba(92, 36, 48, 0.25);
            display: inline-block;
        }

        .hero-description {
            font-size: 16px;
            color: var(--text-sub-dark);
            line-height: 1.7;
            margin-bottom: 35px;
        }

        .hero-description span {
            color: var(--primary);
            font-weight: 500;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(176, 67, 88, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: rgba(92, 36, 48, 0.06);
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background-color: rgba(176, 67, 88, 0.1);
        }

        .hero-image-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 500px;
            width: 100%;
            background: radial-gradient(circle, rgba(176, 67, 88, 0.12) 0%, transparent 70%);
            border-radius: 30px;
        }

        .hero-track {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--primary);
            font-weight: 700;
        }

        /* =========================================
           Responsive / Phone Screen Only (max-width: 576px)
           ========================================= */
        @media (min-width: 577px) {
            /* Hides hamburger and side-panel on tablets and desktops */
            .hamburger {
                display: none !important;
            }
        }

        @media (max-width: 576px) {
            /* Show hamburger button ONLY on phone screens */
            .hamburger {
                display: flex;
            }

            .navbar-search {
                display: none; 
            }

            /* Slide-in Side Panel from Left to Right */
            .navbar-links {
                position: fixed;
                top: 0;
                left: -100%; /* Hidden completely off-screen to the left */
                width: 280px; /* Panel width */
                height: 100vh; /* Full viewport height */
                background-color: #FAF8F8;
                flex-direction: column;
                align-items: flex-start;
                padding: 100px 30px 30px 30px;
                gap: 25px;
                box-shadow: 5px 0 25px rgba(0, 0, 0, 0.1);
                transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1);
                z-index: 999;
            }

            /* Active state triggers slide-in */
            .navbar-links.active {
                left: 0;
            }

            /* Styling and hover effects for links inside the mobile menu panel */
            .navbar-links a {
                font-size: 18px;
                width: 100%;
                padding: 8px 12px;
                border-radius: 8px;
                transition: background-color 0.3s ease, color 0.3s ease, transform 0.3s ease;
            }

            .navbar-links a:hover,
            .navbar-links a.active {
                background-color: rgba(176, 67, 88, 0.1);
                color: #9A384C; /* Updated hover & active text color */
                transform: translateX(6px); /* Subtle slide-right effect on hover */
            }

            /* Hamburger animation when active */
            .hamburger.active span:nth-child(1) {
                transform: translateY(9px) rotate(45deg);
            }
            .hamburger.active span:nth-child(2) {
                opacity: 0;
            }
            .hamburger.active span:nth-child(3) {
                transform: translateY(-9px) rotate(-45deg);
            }

            .hero-grid {
                grid-template-columns: 1fr;
                gap: 40px;
                text-align: center;
            }

            .hero-content {
                max-width: 100%;
            }

            .hero-title {
                align-items: center;
            }

            .hero-title .line-1, 
            .hero-title .line-2 {
                transform: none;
                margin-left: 0;
            }

            .hero-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="navbar-logo">
                <span class="navbar-logo-text">GELATO</span>
            </a>
            
            <!-- Side Panel Links (Controlled by id="navLinks") -->
            <div class="navbar-links" id="navLinks">
                <a href="index.html" class="active">Home</a>
                <a href="menu.html">Menu</a>
                <a href="catering.html">Catering</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>

            <div class="navbar-icons">
                <div class="navbar-search">
                    <input type="text" placeholder="Search...">
                    <i class="ti ti-search"></i>
                </div>
                <a href="cart.html" style="position:relative;" aria-label="Cart">
                    <i class="ti ti-shopping-cart"></i>
                    <span class="cart-badge">0</span>
                </a>
                <a href="account.html" aria-label="Account">
                    <div class="navbar-profile">
                        <i class="ti ti-user"></i>
                    </div>
                </a>
            </div>

            <!-- Hamburger Button (Controlled by id="hamburgerBtn") -->
            <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <section class="hero-section">
            <div class="container">
                <div class="hero-grid">
                    <div class="hero-content">
                        <div class="hero-subtitle-top">
                            ♥ Scoop Happiness ♥
                        </div>
                        
                        <h1 class="hero-title">
                            <span class="line-1">
                                <span class="dark-word">in</span> <span class="highlight-3d">Every</span>
                            </span>
                            <span class="line-2">
                                <span class="highlight-3d">Bite</span> <span class="dark-word">♥</span>
                            </span>
                        </h1>
                        
                        <p class="hero-description">
                            Crafted with the finest real ingredients, <br> designed to turn simple moments into <br> <span>unforgettable indulgence.</span>
                        </p>
                        
                        <div class="hero-buttons">
                            <a href="menu.html" class="btn btn-primary">
                                Order Now
                            </a>
                            <a href="flavors.html" class="btn btn-secondary">
                                Explore Flavors
                            </a>
                        </div>
                    </div>

                    <div class="hero-image-wrapper">
                        <div class="hero-track">
                            Gelato Showcase Area 🍨
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- JavaScript for Mobile Slide-in Panel Toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const navLinks = document.getElementById('navLinks');
            const navItems = document.querySelectorAll('.navbar-links a');

            if (!hamburgerBtn || !navLinks) return;

            const toggleMenu = () => {
                hamburgerBtn.classList.toggle('active');
                navLinks.classList.toggle('active');
            };

            const closeMenu = () => {
                hamburgerBtn.classList.remove('active');
                navLinks.classList.remove('active');
            };

            hamburgerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMenu();
            });

            navItems.forEach(link => {
                link.addEventListener('click', closeMenu);
            });

            // Close panel when clicking outside of it
            document.addEventListener('click', (e) => {
                const isClickInside = navLinks.contains(e.target) || hamburgerBtn.contains(e.target);
                if (!isClickInside && navLinks.classList.contains('active')) {
                    closeMenu();
                }
            });
        });
    </script>
</body>
</html>
